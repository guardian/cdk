name: Integration Tests
on:
  pull_request:
  workflow_dispatch:
jobs:
  ProjectGeneration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".tool-versions"
          cache: npm
      - run: ./script/ci-project-generation
